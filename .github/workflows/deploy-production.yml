name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: vistafam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - gateway
          - authsphere
          - teamsync-api
          - teamsync-web
          - flowboard
          - vaultspace
          - loglens
          - devpulse
          - schemaforge
          - querymind
          - deployhub
          - insightai
          - pipevista
          - pipevista-event-hub
          - pipevista-ai-router
          - pipevista-realtime
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Pre-deploy backup
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.PROD_VPS_HOST }} << 'EOF'
            set -e
            cd /opt/vistafam
            mkdir -p backups/pre-deploy
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            docker exec vistafam-postgres pg_dump -U vistafam vistafam | gzip > backups/pre-deploy/pre-${TIMESTAMP}.sql.gz
            echo "Pre-deploy backup created: pre-${TIMESTAMP}.sql.gz"
          EOF

      - name: Deploy to Production VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.PROD_VPS_HOST }} << 'EOF'
            set -e
            cd /opt/vistafam
            
            # Pull new images
            docker-compose -f docker-compose.production.yml pull
            
            # Rolling update
            docker-compose -f docker-compose.production.yml up -d
            
            # Wait for services to start
            sleep 15
            
            # Health checks
            for svc in nginx gateway authsphere teamsync-api flowboard vaultspace pipevista insightai deployhub loglens devpulse schemaforge querymind; do
              echo "Checking $svc..."
              docker inspect --format='{{.State.Health.Status}}' vistafam-$svc | grep -q healthy || true
            done
            
            # End-to-end smoke test
            curl -sf http://localhost/nginx-health || { echo "NGINX health check failed"; exit 1; }
            curl -sf http://localhost:4000/health/live || { echo "Gateway health check failed"; exit 1; }
            curl -sf http://localhost:4002/health/live || { echo "TeamSync health check failed"; exit 1; }
            
            # Prune old images
            docker image prune -af --filter "until=168h"
            
            echo "Production deployed successfully"
          EOF

      - name: Notify
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Production deployment succeeded"
          else
            echo "Production deployment failed - check logs and consider rollback"
          fi
