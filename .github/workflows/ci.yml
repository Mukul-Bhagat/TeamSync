name: VistaFam CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: vistafam

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  build-packages:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter=@vistafam/*

  build-apps:
    runs-on: ubuntu-latest
    needs: build-packages
    strategy:
      matrix:
        app:
          - gateway
          - authsphere
          - teamsync-api
          - teamsync-web
          - flowboard
          - vaultspace
          - loglens
          - devpulse
          - schemaforge
          - querymind
          - deployhub
          - insightai
          - pipevista
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm build --filter=@vistafam/${{ matrix.app }}

  docker-build:
    runs-on: ubuntu-latest
    needs: build-apps
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        app:
          - gateway
          - authsphere
          - teamsync-api
          - teamsync-web
          - flowboard
          - vaultspace
          - loglens
          - devpulse
          - schemaforge
          - querymind
          - deployhub
          - insightai
          - pipevista
          - pipevista-event-hub
          - pipevista-ai-router
          - pipevista-realtime
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.app }}.Dockerfile
          push: true
          tags: |
            ghcr.io/vistafam/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/vistafam/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
      - name: Run npm audit
        run: pnpm audit --audit-level=high
