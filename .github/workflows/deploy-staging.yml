name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: vistafam

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to Staging VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.STAGING_VPS_HOST }} << 'EOF'
            set -e
            cd /opt/vistafam
            
            # Pull latest images
            docker-compose -f infrastructure/environments/staging/docker-compose.yml pull
            
            # Rolling update
            docker-compose -f infrastructure/environments/staging/docker-compose.yml up -d
            
            # Wait for services
            sleep 10
            
            # Smoke tests
            curl -sf http://localhost/nginx-health || exit 1
            curl -sf http://localhost:4000/health/live || exit 1
            curl -sf http://localhost:4001/health/live || exit 1
            curl -sf http://localhost:4002/health/live || exit 1
            
            echo "Staging deployed successfully"
          EOF
