# ── PipeVista Core ─────────────────────────────────────────
location /api/events/ {
    limit_req zone=general burst=50 nodelay;
    proxy_pass http://pipevista-event-hub:4101/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

