# VistaFam Virtual Host Configuration
# Included by nginx.prod.conf

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Health check
location /nginx-health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# ── Observability ──────────────────────────────────────────
location /grafana/ {
    proxy_pass http://grafana_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_path / /grafana/;
}

location /prometheus/ {
    # Uncomment for IP restriction in production:
    # allow 10.0.0.0/8;
    # deny all;
    proxy_pass http://prometheus_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# ── TeamSync Web App (default) ─────────────────────────────
location / {
    proxy_pass http://teamsync_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# ── API Routes ─────────────────────────────────────────────
location /api/v1/ {
    limit_req zone=general burst=20 nodelay;
    proxy_pass http://gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Trace-ID $http_x_trace_id;
    proxy_set_header X-Tenant-ID $http_x_tenant_id;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
}

