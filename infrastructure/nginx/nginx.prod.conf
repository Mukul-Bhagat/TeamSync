# VistaFam Production NGINX Reverse Proxy
# Self-signed SSL (upgrade to Let's Encrypt when domain acquired)
#
# Handles: SSL termination, rate limiting, gzip, WebSocket upgrades,
# upstream routing to all 15+ microservices.

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format vistafam '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time '
                        'uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" '
                        'urt="$upstream_response_time" '
                        'tid=$http_x_trace_id '
                        'tenant=$http_x_tenant_id';

    access_log /var/log/nginx/access.log vistafam;

    # ── Performance ────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ── Gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ── Rate Limiting ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    limit_req_zone $http_x_api_key zone=api_client:10m rate=1000r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream Definitions ───────────────────────────────────
    upstream gateway {
        server gateway:4000;
        keepalive 32;
    }

    upstream teamsync_web {
        server teamsync-web:3002;
        keepalive 32;
    }

    upstream pipevista_realtime {
        server pipevista-realtime:4105;
        keepalive 32;
    }

    upstream grafana_upstream {
        server grafana:3000;
        keepalive 16;
    }

    upstream prometheus_upstream {
        server prometheus:9090;
        keepalive 16;
    }

    # ── HTTP Server (redirects to HTTPS when domain available) ─
    server {
        listen 80;
        server_name _;

        # Certbot challenge (for Let's Encrypt later)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # When domain + certs are ready, uncomment:
        # return 301 https://$host$request_uri;

        # For now, serve everything over HTTP (no domain yet)
        include /etc/nginx/vhost.conf;
    }

    # ── HTTPS Server (enabled after Let's Encrypt) ─────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     include /etc/nginx/vhost.conf;
    # }

    # ── Self-signed HTTPS (optional, for testing SSL) ────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        include /etc/nginx/vhost.conf;
    }
}
