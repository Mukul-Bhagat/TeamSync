# VistaFam Staging Environment
# Smaller resource footprint, debug logging enabled
# Deploy: docker-compose -f docker-compose.yml up -d

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  gateway:
    image: ghcr.io/vistafam/gateway:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4000
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      AUTHSPHERE_URL: http://authsphere:4001
      PIPEVISTA_URL: http://pipevista:4006
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    depends_on:
      - nats
      - redis
      - authsphere
      - pipevista
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  authsphere:
    image: ghcr.io/vistafam/authsphere:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=authsphere
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  teamsync-api:
    image: ghcr.io/vistafam/teamsync-api:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4002
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=teamsync
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REALTIME_URL: http://pipevista-realtime:4105
      MINIO_URL: http://minio:9000
      AI_ROUTER_URL: http://pipevista-ai-router:4102
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  teamsync-web:
    image: ghcr.io/vistafam/teamsync-web:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3002
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:4002
    depends_on:
      - gateway
      - teamsync-api
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  flowboard:
    image: ghcr.io/vistafam/flowboard:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4003
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=flowboard
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  vaultspace:
    image: ghcr.io/vistafam/vaultspace:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4004
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=vaultspace
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      - postgres
      - redis
      - nats
      - minio
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  loglens:
    image: ghcr.io/vistafam/loglens:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4007
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=loglens
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  devpulse:
    image: ghcr.io/vistafam/devpulse:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4008
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=devpulse
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  schemaforge:
    image: ghcr.io/vistafam/schemaforge:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4009
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=schemaforge
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  querymind:
    image: ghcr.io/vistafam/querymind:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4010
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=querymind
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
      INSIGHTAI_URL: http://insightai:4012
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
      - insightai
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  deployhub:
    image: ghcr.io/vistafam/deployhub:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4011
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=deployhub
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  insightai:
    image: ghcr.io/vistafam/insightai:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4012
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=insightai
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  pipevista:
    image: ghcr.io/vistafam/pipevista:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4006
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vistafam?schema=pipevista
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTHSPHERE_URL: http://authsphere:4001
    depends_on:
      - postgres
      - redis
      - nats
      - authsphere
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  pipevista-event-hub:
    image: ghcr.io/vistafam/pipevista-event-hub:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4101
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
    depends_on:
      - nats
      - redis
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  pipevista-ai-router:
    image: ghcr.io/vistafam/pipevista-ai-router:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4102
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - redis
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  pipevista-realtime:
    image: ghcr.io/vistafam/pipevista-realtime:develop
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4105
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      - redis
      - nats
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ── Infrastructure (staging: lighter) ───────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vistafam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vistafam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vistafam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: --js --store_dir /data/jetstream --http_port 8222
    volumes:
      - nats_data:/data/jetstream
    networks:
      - vistafam-staging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - vistafam-staging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:

networks:
  vistafam-staging:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
